name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install stac-check
        run: pip install stac-check==1.9.1

      - name: Create test STAC item
        run: |
          cat > "${RUNNER_TEMP}/test-item.json" << 'EOF'
          {
            "type": "Feature",
            "stac_version": "1.0.0",
            "stac_extensions": [],
            "id": "test-item",
            "geometry": {"type": "Point", "coordinates": [0, 0]},
            "bbox": [0, 0, 0, 0],
            "properties": {"datetime": "2024-01-01T00:00:00Z"},
            "links": [{"rel": "self", "href": "test-item.json"}],
            "assets": {}
          }
          EOF

      - name: Run stac-check
        run: stac-check "${RUNNER_TEMP}/test-item.json"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate action.yml
        run: |
          python3 -c "
          import yaml
          with open('action.yml') as f:
              data = yaml.safe_load(f)
          print('action.yml valid')
          "

      - name: Check LF line endings
        run: |
          ! grep -rI --exclude-dir=.git $'\r' --include='*.yml' --include='*.yaml' --include='*.md' . || (echo 'CRLF detected'; exit 1)

  lint-actions:
    name: GitHub Actions audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8 # v1.7.11

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false

  e2e:
    name: E2E Test with Overture STAC
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: stac-check-action
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Clone and setup overturemaps/stac
        run: |
          git clone --depth 1 https://github.com/OvertureMaps/stac.git "${RUNNER_TEMP}/overture-stac"
          cd "${RUNNER_TEMP}/overture-stac"
          uv sync

      - name: Generate STAC catalog
        run: |
          cd "${RUNNER_TEMP}/overture-stac"
          uv run gen-stac --output "${RUNNER_TEMP}/stac-catalog" --debug

      - name: Run stac-check-action (self)
        uses: ./stac-check-action
        continue-on-error: true
        id: e2e
        with:
          stac-check-version: 1.9.1
          file: ${{ runner.temp }}/stac-catalog/catalog.json
          recursive: true
          validate-assets: true

      - name: Verify stac-check detected failures
        shell: bash
        env:
          E2E_EXIT_CODE: ${{ steps.e2e.outputs.exit-code }}
        run: |
          if [ "${E2E_EXIT_CODE}" = "0" ]; then
            echo "::error::E2E test should have failed (overture STAC is non-conforming)"
            exit 1
          fi
          echo "E2E test correctly detected non-conforming STAC (exit code: ${E2E_EXIT_CODE})"

  bats:
    name: BATS Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install bats-core
        run: npm install -g bats

      - name: Run BATS tests
        run: bats tests/

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    permissions: {}
    needs: [test, lint, lint-actions, e2e, bats]
    if: always()
    steps:
      - uses: lowlydba/are-we-good@7efad05442f92a1203940ca8b79dd4fb930e75d4 # v1.0.2
        with:
          jobs: ${{ toJSON(needs) }}
