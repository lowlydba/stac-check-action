name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install stac-check
        run: pip install stac-check==v1.14.0

      - name: Create test STAC item
        run: |
          cat > /tmp/test-item.json << 'EOF'
          {
            "type": "Feature",
            "stac_version": "1.0.0",
            "stac_extensions": [],
            "id": "test-item",
            "geometry": {"type": "Point", "coordinates": [0, 0]},
            "bbox": [0, 0, 0, 0],
            "properties": {"datetime": "2024-01-01T00:00:00Z"},
            "links": [{"rel": "self", "href": "test-item.json"}],
            "assets": {}
          }
          EOF

      - name: Run stac-check
        run: stac-check /tmp/test-item.json

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate action.yml
        run: |
          python3 -c "
          import yaml
          with open('action.yml') as f:
              data = yaml.safe_load(f)
          print('action.yml valid')
          "

      - name: Check LF line endings
        run: |
          ! grep -r $'\r' --include='*.yml' --include='*.md' . || (echo 'CRLF detected'; exit 1)

  e2e:
    name: E2E Test with Overture STAC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: stac-check-action

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Clone and setup overturemaps/stac
        run: |
          git clone --depth 1 https://github.com/OvertureMaps/stac.git $RUNNER_TEMP/overture-stac
          cd $RUNNER_TEMP/overture-stac
          uv sync

      - name: Generate STAC catalog
        run: |
          cd $RUNNER_TEMP/overture-stac
          uv run gen-stac --output $RUNNER_TEMP/stac-catalog --debug

      - name: Run stac-check-action (self)
        uses: ./stac-check-action
        with:
          stac-check-version: v1.14.0
          file: $RUNNER_TEMP/stac-catalog/catalog.json
          recursive: true
          validate-assets: true
