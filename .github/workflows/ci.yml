name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install stac-check
        run: pip install stac-check==v1.14.0

      - name: Create test STAC item
        run: |
          cat > /tmp/test-item.json << 'EOF'
          {
            "type": "Feature",
            "stac_version": "1.0.0",
            "stac_extensions": [],
            "id": "test-item",
            "geometry": {"type": "Point", "coordinates": [0, 0]},
            "bbox": [0, 0, 0, 0],
            "properties": {"datetime": "2024-01-01T00:00:00Z"},
            "links": [{"rel": "self", "href": "test-item.json"}],
            "assets": {}
          }
          EOF

      - name: Run stac-check
        run: stac-check /tmp/test-item.json

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml
        run: |
          python3 -c "
          import yaml
          with open('action.yml') as f:
              data = yaml.safe_load(f)
          print('action.yml valid')
          "

      - name: Check LF line endings
        run: |
          ! grep -r $'\r' --include='*.yml' --include='*.md' . || (echo 'CRLF detected'; exit 1)

  e2e:
    name: E2E Test with Overture STAC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: stac-check-action

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Clone and setup overturemaps/stac
        run: |
          git clone --depth 1 https://github.com/OvertureMaps/stac.git $RUNNER_TEMP/overture-stac
          cd $RUNNER_TEMP/overture-stac
          uv sync

      - name: Generate STAC catalog
        run: |
          cd $RUNNER_TEMP/overture-stac
          uv run gen-stac --output $RUNNER_TEMP/stac-catalog --debug

      - name: Run stac-check-action (self)
        uses: ./stac-check-action
        continue-on-error: true
        id: e2e
        with:
          stac-check-version: v1.14.0
          file: $RUNNER_TEMP/stac-catalog/catalog.json
          recursive: true
          validate-assets: true

      - name: Verify stac-check detected failures
        shell: bash
        run: |
          if [ "${{ steps.e2e.outputs.exit-code }}" = "0" ]; then
            echo "::error::E2E test should have failed (overture STAC is non-conforming)"
            exit 1
          fi
          echo "E2E test correctly detected non-conforming STAC (exit code: ${{ steps.e2e.outputs.exit-code }})"

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: [test, lint, e2e]
    if: always()
    steps:
      - uses: lowlydba/are-we-good@latest
        with:
          jobs: ${{ toJSON(needs) }}
