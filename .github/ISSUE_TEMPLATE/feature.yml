name: Feature Request
description: Suggest a new input, output, or behavior
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like and why it's useful.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What can't you do today? What workaround are you using?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the change — new input, output, behavior, etc.
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example workflow snippet
      description: How would the new feature look in a workflow?
      render: yaml

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: context
    attributes:
      label: Additional context
