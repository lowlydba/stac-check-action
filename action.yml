name: 'stac-check-action'
description: 'Run stac-check on local STAC files'
author: 'lowlydba'
branding:
  icon: 'globe'
  color: 'green'

inputs:
  stac-check-version:
    description: 'stac-check PyPI version (e.g., 1.9.1 or v1.9.1; leading "v" stripped) or "latest"'
    required: true
  file:
    description: 'Path to local STAC file to validate'
    required: true
  recursive:
    description: 'Recursively validate related local STAC objects'
    required: false
    default: 'false'
  max-depth:
    description: 'Maximum recursion depth (requires recursive: true)'
    required: false
    default: ''
  validate-assets:
    description: 'Validate assets locally (no network requests)'
    required: false
    default: 'false'
  pydantic:
    description: 'Use stac-pydantic for enhanced validation'
    required: false
    default: 'false'
  verbose:
    description: 'Show verbose error messages'
    required: false
    default: 'false'
  fast:
    description: 'Fast validation with FastJSONSchema, no geometry/linting'
    required: false
    default: 'false'
  fast-linting:
    description: 'Fast validation with linting, no geometry checks'
    required: false
    default: 'false'
  output-file:
    description: 'Save CLI output to file (requires recursive: true per stac-check CLI)'
    required: false
    default: ''
  job-summary:
    description: 'Write validation results to GitHub job summary'
    required: false
    default: 'true'
  comment-pr:
    description: 'Post validation summary as PR comment (requires pull-requests: write)'
    required: false
    default: 'false'
  extra-args:
    description: 'Additional stac-check CLI arguments (appended last)'
    required: false
    default: ''
  config:
    description: 'Path to config file or inline YAML (sets STAC_CHECK_CONFIG env var)'
    required: false
    default: ''

outputs:
  exit-code:
    description: 'Exit code from stac-check (0=valid, non-zero=issues)'
    value: ${{ steps.run.outputs.exit-code }}
  output-file:
    description: 'Path to file containing CLI output (if output-file input was set)'
    value: ${{ steps.run.outputs.output-file }}

runs:
  using: 'composite'
  steps:
    - name: Install stac-check
      shell: bash
      env:
        VERSION: ${{ inputs.stac-check-version }}
      run: |
        set -euo pipefail
        if [ "$VERSION" = "latest" ]; then
          pip install --quiet stac-check
        else
          # Strip leading 'v' if present (PyPI versions don't use v-prefix)
          VERSION="${VERSION#v}"
          pip install --quiet "stac-check==${VERSION}"
        fi

    - name: Run stac-check
      id: run
      shell: bash
      env:
        IN_FILE: ${{ inputs.file }}
        IN_RECURSIVE: ${{ inputs.recursive }}
        IN_MAX_DEPTH: ${{ inputs.max-depth }}
        IN_VALIDATE_ASSETS: ${{ inputs.validate-assets }}
        IN_PYDANTIC: ${{ inputs.pydantic }}
        IN_VERBOSE: ${{ inputs.verbose }}
        IN_FAST: ${{ inputs.fast }}
        IN_FAST_LINTING: ${{ inputs.fast-linting }}
        IN_OUTPUT_FILE: ${{ inputs.output-file }}
        IN_EXTRA_ARGS: ${{ inputs.extra-args }}
        IN_CONFIG: ${{ inputs.config }}
      run: |
        set -uo pipefail
        ARGS=()

        if [ "$IN_RECURSIVE" = "true" ]; then
          ARGS+=(--recursive)
          if [ -n "$IN_MAX_DEPTH" ]; then
            ARGS+=(--max-depth "$IN_MAX_DEPTH")
          fi
        fi

        if [ "$IN_VALIDATE_ASSETS" = "true" ]; then
          ARGS+=(--assets --no-assets-urls)
        fi

        [ "$IN_PYDANTIC" = "true" ] && ARGS+=(--pydantic)
        [ "$IN_VERBOSE" = "true" ] && ARGS+=(--verbose)

        if [ "$IN_FAST" = "true" ]; then
          ARGS+=(--fast)
        elif [ "$IN_FAST_LINTING" = "true" ]; then
          ARGS+=(--fast-linting)
        fi

        if [ -n "$IN_OUTPUT_FILE" ]; then
          if [ "$IN_RECURSIVE" != "true" ]; then
            echo "::error::output-file requires recursive: true (stac-check CLI limitation)"
            exit 1
          fi
          ARGS+=(--output "$IN_OUTPUT_FILE")
          echo "output-file=$IN_OUTPUT_FILE" >> "$GITHUB_OUTPUT"
        fi

        # Append extra-args (word-split intentionally for CLI flags)
        if [ -n "$IN_EXTRA_ARGS" ]; then
          # shellcheck disable=SC2206
          EXTRA=($IN_EXTRA_ARGS)
          ARGS+=("${EXTRA[@]}")
        fi

        ARGS+=("$IN_FILE")

        # Handle config: file path OR inline YAML (multiline)
        if [ -n "$IN_CONFIG" ]; then
          if [ -f "$IN_CONFIG" ]; then
            export STAC_CHECK_CONFIG="$IN_CONFIG"
          elif [[ "$IN_CONFIG" == *$'\n'* ]]; then
            CONFIG_PATH="$RUNNER_TEMP/stac-check-config.yml"
            printf '%s' "$IN_CONFIG" > "$CONFIG_PATH"
            export STAC_CHECK_CONFIG="$CONFIG_PATH"
          else
            echo "::error::config input is neither a readable file path nor multiline inline YAML"
            exit 1
          fi
        fi

        OUTPUT_PATH="$RUNNER_TEMP/stac-check-output.txt"
        echo "output-path=$OUTPUT_PATH" >> "$GITHUB_OUTPUT"

        set +e
        stac-check "${ARGS[@]}" > "$OUTPUT_PATH" 2>&1
        EXIT_CODE=$?
        set -e

        cat "$OUTPUT_PATH"
        echo "exit-code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

    - name: Write to job summary
      if: ${{ always() && inputs.job-summary == 'true' && steps.run.outputs.output-path != '' }}
      shell: bash
      env:
        OUTPUT_PATH: ${{ steps.run.outputs.output-path }}
      run: |
        set -euo pipefail
        {
          echo "## stac-check Results"
          echo ""
          echo '```'
          if grep -q "Validation Summary" "$OUTPUT_PATH" 2>/dev/null; then
            sed -n '/Validation Summary/,$p' "$OUTPUT_PATH"
          else
            cat "$OUTPUT_PATH"
          fi
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Post PR comment
      if: ${{ always() && inputs.comment-pr == 'true' && github.event_name == 'pull_request' && steps.run.outputs.output-path != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        OUTPUT_PATH: ${{ steps.run.outputs.output-path }}
        PR_NUMBER: ${{ github.event.number }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        MARKER="<!-- stac-check-action -->"
        BODY_PATH="$RUNNER_TEMP/stac-check-comment.md"
        {
          echo "$MARKER"
          echo "## stac-check Results"
          echo ""
          echo '```'
          if grep -q "Validation Summary" "$OUTPUT_PATH" 2>/dev/null; then
            sed -n '/Validation Summary/,$p' "$OUTPUT_PATH"
          else
            cat "$OUTPUT_PATH"
          fi
          echo '```'
        } > "$BODY_PATH"

        # Find existing comment with marker
        COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
          --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -n1)

        if [ -n "$COMMENT_ID" ]; then
          gh api --method PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" \
            --field body="$(cat "$BODY_PATH")"
        else
          gh pr comment "$PR_NUMBER" --body-file "$BODY_PATH"
        fi

    - name: Fail on issues
      if: always()
      shell: bash
      env:
        EXIT_CODE: ${{ steps.run.outputs.exit-code }}
      run: |
        if [ "${EXIT_CODE:-1}" != "0" ]; then
          echo "::error::stac-check exited with code: ${EXIT_CODE:-1}"
          exit "${EXIT_CODE:-1}"
        fi
