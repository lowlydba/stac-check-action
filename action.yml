name: 'stac-check-action'
description: 'Run stac-check on local STAC files'
author: 'lowlydba'
branding:
  icon: 'globe'
  color: 'green'

inputs:
  stac-check-version:
    description: 'stac-check PyPI version (e.g., 1.9.1 or v1.9.1; leading "v" stripped) or "latest"'
    required: true
  file:
    description: 'Path to local STAC file to validate'
    required: true
  recursive:
    description: 'Recursively validate related local STAC objects'
    required: false
    default: 'false'
  max-depth:
    description: 'Maximum recursion depth (requires recursive: true)'
    required: false
    default: ''
  validate-assets:
    description: 'Validate assets locally (no network requests)'
    required: false
    default: 'false'
  pydantic:
    description: 'Use stac-pydantic for enhanced validation'
    required: false
    default: 'false'
  verbose:
    description: 'Show verbose error messages'
    required: false
    default: 'false'
  fast:
    description: 'Fast validation with FastJSONSchema, no geometry/linting'
    required: false
    default: 'false'
  fast-linting:
    description: 'Fast validation with linting, no geometry checks'
    required: false
    default: 'false'
  output-file:
    description: 'Save CLI output to file (requires recursive: true per stac-check CLI)'
    required: false
    default: ''
  job-summary:
    description: 'Write validation results to GitHub job summary'
    required: false
    default: 'true'
  comment-pr:
    description: 'Post validation summary as PR comment (requires pull-requests: write)'
    required: false
    default: 'false'
  extra-args:
    description: 'Additional stac-check CLI arguments (appended last)'
    required: false
    default: ''
  config:
    description: 'Path to config file or inline YAML (sets STAC_CHECK_CONFIG env var)'
    required: false
    default: ''

outputs:
  exit-code:
    description: 'Raw stac-check CLI exit code. Note: not authoritative for recursive validation — check `valid` instead, since stac-check often returns 0 even when recursive validation fails.'
    value: ${{ steps.run.outputs.exit-code }}
  log-path:
    description: 'Path to captured stac-check stdout/stderr. Set on every successful invocation of the runner (created before input validation, so available even on early-exit errors).'
    value: ${{ steps.run.outputs.log-path }}
  valid:
    description: 'Authoritative validation result: `true` if no failure markers were found in the stac-check output, `false` otherwise.'
    value: ${{ steps.run.outputs.valid }}

runs:
  using: 'composite'
  steps:
    - name: Install stac-check
      shell: bash
      env:
        VERSION: ${{ inputs.stac-check-version }}
      run: |
        set -euo pipefail
        if [ "$VERSION" = "latest" ]; then
          pip install --quiet stac-check
        else
          # Strip leading 'v' if present (PyPI versions don't use v-prefix)
          VERSION="${VERSION#v}"
          pip install --quiet "stac-check==${VERSION}"
        fi

    - name: Run stac-check
      id: run
      shell: bash
      env:
        IN_FILE: ${{ inputs.file }}
        IN_RECURSIVE: ${{ inputs.recursive }}
        IN_MAX_DEPTH: ${{ inputs.max-depth }}
        IN_VALIDATE_ASSETS: ${{ inputs.validate-assets }}
        IN_PYDANTIC: ${{ inputs.pydantic }}
        IN_VERBOSE: ${{ inputs.verbose }}
        IN_FAST: ${{ inputs.fast }}
        IN_FAST_LINTING: ${{ inputs.fast-linting }}
        IN_OUTPUT_FILE: ${{ inputs.output-file }}
        IN_EXTRA_ARGS: ${{ inputs.extra-args }}
        IN_CONFIG: ${{ inputs.config }}
        ACTION_PATH: ${{ github.action_path }}
      run: bash "$ACTION_PATH/scripts/run.sh"

    - name: Write to job summary
      if: ${{ always() && inputs.job-summary == 'true' && steps.run.outputs.log-path != '' }}
      shell: bash
      env:
        OUTPUT_PATH: ${{ steps.run.outputs.log-path }}
      run: |
        set -euo pipefail
        {
          echo "## stac-check Results"
          echo ""
          echo '```'
          if grep -q "Validation Summary" "$OUTPUT_PATH" 2>/dev/null; then
            sed -n '/Validation Summary/,$p' "$OUTPUT_PATH"
          else
            cat "$OUTPUT_PATH"
          fi
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Post PR comment
      if: ${{ always() && inputs.comment-pr == 'true' && github.event_name == 'pull_request' && steps.run.outputs.log-path != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        OUTPUT_PATH: ${{ steps.run.outputs.log-path }}
        PR_NUMBER: ${{ github.event.number }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        MARKER="<!-- stac-check-action -->"
        BODY_PATH="$RUNNER_TEMP/stac-check-comment.md"
        {
          echo "$MARKER"
          echo "## stac-check Results"
          echo ""
          echo '```'
          if grep -q "Validation Summary" "$OUTPUT_PATH" 2>/dev/null; then
            sed -n '/Validation Summary/,$p' "$OUTPUT_PATH"
          else
            cat "$OUTPUT_PATH"
          fi
          echo '```'
        } > "$BODY_PATH"

        # Find existing comment with marker (paginate to handle busy PRs)
        COMMENT_ID=$(gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/comments" \
          --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -n1)

        if [ -n "$COMMENT_ID" ]; then
          # Stream body via stdin to avoid ARG_MAX limits on large outputs
          gh api --method PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" \
            --field "body=@${BODY_PATH}"
        else
          gh pr comment "$PR_NUMBER" --body-file "$BODY_PATH"
        fi

    - name: Fail on issues
      if: always()
      shell: bash
      env:
        EXIT_CODE: ${{ steps.run.outputs.exit-code }}
        VALID: ${{ steps.run.outputs.valid }}
        RUN_OUTCOME: ${{ steps.run.outcome }}
      run: |
        # If the runner script failed before stac-check executed (input
        # validation, config parse error, etc), exit-code output is empty.
        # Surface that as the real error rather than rewriting it as a
        # phantom 'stac-check exit 1'.
        if [ -z "${EXIT_CODE}" ]; then
          if [ "${RUN_OUTCOME}" = "failure" ]; then
            echo "::error::stac-check-action runner failed before stac-check executed; see prior step output"
            exit 1
          fi
          # Run step succeeded but didn't write exit-code: should not happen.
          echo "::error::internal: run step produced no exit-code output"
          exit 1
        fi
        if [ "${EXIT_CODE}" != "0" ]; then
          echo "::error::stac-check exited with code: ${EXIT_CODE}"
          exit "${EXIT_CODE}"
        fi
        if [ "${VALID:-true}" = "false" ]; then
          echo "::error::stac-check reported validation failures (exit-code was 0 but failure markers found in output)"
          exit 1
        fi
